name: check

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

# One run at a time; a late cron tick queues instead of racing the push.
concurrency:
  group: pulse-check
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run checks
        id: run
        continue-on-error: true # capture the exit code; fail at the end, after committing
        env:
          POKER_SUPABASE_URL: ${{ secrets.POKER_SUPABASE_URL }}
          POKER_SUPABASE_KEY: ${{ secrets.POKER_SUPABASE_KEY }}
          IRONLOG_SUPABASE_URL: ${{ secrets.IRONLOG_SUPABASE_URL }}
          IRONLOG_SUPABASE_KEY: ${{ secrets.IRONLOG_SUPABASE_KEY }}
        run: node check.mjs

      - name: Commit status
        run: |
          git config user.name "pulse-bot"
          git config user.email "actions@github.com"
          git add status.json history.json
          if git diff --cached --quiet; then
            echo "no change"
          else
            git commit -m "status: $(date -u +%FT%TZ)"
            git pull --rebase origin main
            git push origin main
          fi

      # A failed run is the alert: GitHub emails on workflow failure.
      - name: Fail if anything is down
        if: steps.run.outcome == 'failure'
        run: exit 1
